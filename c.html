<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Home Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1>MyProfile</h1>
        <div class="nav-icons">
            <span>🏠</span>
            <span>👤</span>
            <span>💬</span>
            <span>🔔</span>
        </div>
    </nav>
    <div class="container">
        <aside class="sidebar">
            <h2>Profile Details</h2>
            <ul>
                <li>Name: John Doe</li>
                <li>Email: john.doe@example.com</li>
                <li>Location: New York, USA</li>
            </ul>
        </aside>
        <main class="feed">
            <div class="post">This is a sample post!</div>
            <div class="post">Another post here...</div>
        </main>
        <aside class="right-sidebar">
            <h2>Friends</h2>
            <ul>
                <li>Jane Smith</li>
                <li>Michael Brown</li>
            </ul>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
